# Gridlock — YOLOv8 Dataset Configuration
path: ./data          # dataset root (relative to project root)
train: images/train   # training images
val: images/val       # validation images

# Number of classes
nc: 7

# Class names (index must match label files)
names:
  0: motorcycle
  1: car
  2: bus
  3: truck
  4: person
  5: helmet
  6: no_helmet
